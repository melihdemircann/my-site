<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <!-- Arkaplan -->
  <rect width="400" height="600" fill="#f5f5f7" rx="20" ry="20"/>
  
  <!-- Dekoratif şekiller -->
  <circle cx="50" cy="120" r="80" fill="#4a90e2" opacity="0.2"/>
  <circle cx="350" cy="500" r="100" fill="#50e3c2" opacity="0.2"/>
  <circle cx="300" cy="80" r="60" fill="#ff9500" opacity="0.2"/>
  
  <!-- Telefon çerçevesi -->
  <rect x="90" y="100" width="220" height="400" rx="20" ry="20" fill="#333333"/>
  <rect x="100" y="120" width="200" height="360" rx="5" ry="5" fill="#ffffff"/>
  
  <!-- Uygulama başlığı -->
  <rect x="100" y="120" width="200" height="50" rx="5" ry="5" fill="#4a90e2"/>
  <text x="170" y="150" font-family="Arial" font-weight="bold" font-size="20" fill="#ffffff" text-anchor="middle">ToDo</text>
  
  <!-- Görev listesi -->
  <rect x="110" y="180" width="180" height="40" rx="5" ry="5" fill="#ffffff" stroke="#e0e0e0"/>
  <circle cx="130" cy="200" r="10" fill="#50e3c2"/>
  <line x1="127" y1="200" x2="133" y2="206" stroke="#ffffff" stroke-width="2"/>
  <line x1="133" y1="206" x2="140" y2="194" stroke="#ffffff" stroke-width="2"/>
  <text x="150" y="205" font-family="Arial" font-size="14" fill="#333333">Alışveriş yap</text>
  
  <rect x="110" y="230" width="180" height="40" rx="5" ry="5" fill="#ffffff" stroke="#e0e0e0"/>
  <circle cx="130" cy="250" r="10" fill="#ff9500"/>
  <text x="150" y="255" font-family="Arial" font-size="14" fill="#333333">Raporu tamamla</text>
  
  <rect x="110" y="280" width="180" height="40" rx="5" ry="5" fill="#ffffff" stroke="#e0e0e0"/>
  <circle cx="130" cy="300" r="10" fill="#4a90e2"/>
  <text x="150" y="305" font-family="Arial" font-size="14" fill="#333333">Toplantı hazırlığı</text>
  
  <rect x="110" y="330" width="180" height="40" rx="5" ry="5" fill="#ffffff" stroke="#e0e0e0"/>
  <circle cx="130" cy="350" r="10" stroke="#e0e0e0" stroke-width="2" fill="none"/>
  <text x="150" y="355" font-family="Arial" font-size="14" fill="#333333">Spor yap</text>
  
  <rect x="110" y="380" width="180" height="40" rx="5" ry="5" fill="#ffffff" stroke="#e0e0e0"/>
  <circle cx="130" cy="400" r="10" stroke="#e0e0e0" stroke-width="2" fill="none"/>
  <text x="150" y="405" font-family="Arial" font-size="14" fill="#333333">Kitap oku</text>
  
  <!-- Artı butonu -->
  <circle cx="200" cy="450" r="25" fill="#4a90e2"/>
  <line x1="185" y1="450" x2="215" y2="450" stroke="#ffffff" stroke-width="4"/>
  <line x1="200" y1="435" x2="200" y2="465" stroke="#ffffff" stroke-width="4"/>
  
  <!-- Alt navigasyon çubuğu -->
  <rect x="100" y="480" width="200" height="40" rx="0" ry="0" fill="#f8f8f8"/>
  
  <!-- Nav ikonları -->
  <circle cx="140" cy="500" r="12" fill="#e0e0e0"/>
  <circle cx="200" cy="500" r="12" fill="#4a90e2"/>
  <circle cx="260" cy="500" r="12" fill="#e0e0e0"/>
</svg>
