<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melih Demircan | Portfolio</title>
    <!-- Önceki style tanımlamaları aynı kalacak -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/js/all.min.js"></script>
</head>
<body>
    <!-- Önceki HTML içeriği aynı kalacak -->
    
    <script>
        // Typing effect için güncellenmiş kod
        const text = "Melih Demircan";
        let index = 0;
        const typingEffect = document.querySelector('.typing-effect');
        
        function typeText() {
            typingEffect.textContent = ''; // Başlangıçta içeriği temizle
            function type() {
                if (index < text.length) {
                    typingEffect.textContent += text.charAt(index);
                    index++;
                    setTimeout(type, 100);
                }
            }
            type();
        }

        // Sayfa yüklendiğinde efekti başlat
        document.addEventListener('DOMContentLoaded', typeText);
    </script>
</body>
</html>
