<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Melih Demircan - Portfolio</title>
  <!-- Harici CSS dosyasını ekleyin -->
  <link rel="stylesheet" href="style.css">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body data-theme="dark">
  <div class="portfolio-wrapper">
    <div class="background-overlay" aria-hidden="true">
      <!-- Particle background will be dynamically generated -->
    </div>

    <img src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExY2pnY3NzcTR6MTBjc25rY3Bxb2JmMnBnY3h4bHdkbXV0NzR2NG5hdSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3og0IV7MOCfnm85iRa/giphy.gif" alt="Background GIF" id="background-gif" class="background-gif">


    <div class="ground" aria-hidden="true"></div>

    <main class="container" id="projects-container" aria-live="polite">
      <!-- Content will be dynamically loaded here -->
    </main>


    
    <div class="blob-container">
      <div class="blob-character">
          <div class="blob-body">
              <div class="blob-eye blob-eye-left"></div>
              <div class="blob-eye blob-eye-right"></div>
              <div class="blob-smile"></div>
          </div>
          <div class="speech-bubble"></div>
      </div>
  </div>



    <nav class="navigation-buttons">
      <button class="nav-button" id="back-button" aria-label="Previous projects">
        <i class="fas fa-arrow-left"></i>
      </button>
      <button class="nav-button" id="forward-button" aria-label="Next projects">
        <i class="fas fa-arrow-right"></i>
      </button>
    </nav>

    <div class="guides">
      <div class="keyboard-guide guide" role="alert">
        Use ← → keys to navigate
      </div>
      <div class="swipe-guide guide" role="alert">
        Swipe to navigate between projects
      </div>
    </div>

    <div class="modal" id="project-modal" role="dialog" aria-modal="true" aria-labelledby="project-modal-title">
      <div class="modal-content">
        <button class="close-modal" aria-label="Close project details">&times;</button>
        <div id="modal-content">
          <!-- Project details will be dynamically loaded -->
        </div>
      </div>
    </div>
  </div>

 
  <footer class="social-links-container">
    <nav class="social-links" aria-label="Social media links">
      <a href="https://github.com/melihdemircann" class="social-link" aria-label="GitHub Profile">
        <i class="fab fa-github" aria-hidden="true"></i>
        <span class="tooltip">GitHub</span>
      </a>
      <a href="https://www.linkedin.com/in/melihdemircann/" class="social-link" aria-label="LinkedIn Profile">
        <i class="fab fa-linkedin" aria-hidden="true"></i>
        <span class="tooltip">LinkedIn</span>
      </a>
    </nav>
  </footer>
  
    </div>
</div>

  <!-- Harici JavaScript dosyasını ekleyin -->
  <script src="portfolio.js"></script>
</body>
</html>
